<!DOCTYPE html>
<html>
<head>
    <title>AI Helpdesk Chat</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background:#f4f6f9;
            margin:0;
        }

        .navbar{
            background:#2c3e50;
            color:white;
            padding:15px;
            display:flex;
            justify-content:flex-end;
            gap:10px;
        }

        .navbar button{
            background:white;
            border:none;
            padding:8px 15px;
            cursor:pointer;
            border-radius:5px;
        }

        .container{
            width:80%;
            margin:30px auto;
            background:white;
            padding:20px;
            border-radius:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.15);
        }

        h2{
            margin-top:0;
        }

        #chatBox{
            height:450px;
            border:1px solid #ddd;
            border-radius:8px;
            padding:10px;
            overflow-y:auto;
            background:#fafafa;
        }

        .user{
            text-align:right;
            margin:10px;
            color:#0d6efd;
            font-weight:bold;
        }

        .bot{
            text-align:left;
            margin:10px;
            color:#198754;
            font-weight:bold;
        }

        .input-area{
            margin-top:15px;
            display:flex;
            gap:10px;
        }

        #message{
            flex:1;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .send-btn{
            background:#0d6efd;
            color:white;
            border:none;
            padding:12px 20px;
            cursor:pointer;
            border-radius:5px;
        }

        .send-btn:hover{
            background:#0b5ed7;
        }

    </style>
</head>

<body>

<div class="navbar">

    {% if session.get("user_id") %}

<a href="/user-dashboard">
    <button>Dashboard</button>
</a>

<a href="/logout">
    <button>Logout</button>
</a>

{% else %}

<a href="/login">
    <button>Login</button>
</a>

<a href="/register">
    <button>Register</button>
</a>

{% endif %}

</div>

<div class="container">

    <h2>🤖 AI Helpdesk Assistant</h2>

    <div id="chatBox"></div>

    <div class="input-area">
        <input
            type="text"
            id="message"
            placeholder="Describe your issue..."
        >

        <button class="send-btn"
                onclick="sendMessage()">
            Send
        </button>
    </div>

</div>

<script>

async function sendMessage() {

    let msg =
        document.getElementById("message").value.trim();

    if(msg === ""){
        return;
    }

    let chatBox =
        document.getElementById("chatBox");

    chatBox.innerHTML +=
        "<div class='user'>👤 You: "
        + msg +
        "</div>";

    document.getElementById("message").value = "";

    try {

        let response = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: msg
            })
        });

        let data = await response.json();

        chatBox.innerHTML +=
            "<div class='bot'>🤖 AI: "
            + data.response +
            "</div>";

    }
    catch(error){

        chatBox.innerHTML +=
            "<div class='bot'>❌ Unable to contact server.</div>";

        console.error(error);
    }

    chatBox.scrollTop = chatBox.scrollHeight;
}

document
.getElementById("message")
.addEventListener("keypress", function(event){

    if(event.key === "Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
