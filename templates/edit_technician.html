<!DOCTYPE html>
<html>
<head>
    <title>Edit Technician</title>

    <style>

        body{
            background:#f4f6f9;
            font-family:'Segoe UI',sans-serif;
            padding:30px;
        }

        .card{
            max-width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 2px 10px rgba(0,0,0,.1);
        }

        h1{
            margin-bottom:20px;
            color:#2c3e50;
        }

        input,select{
            width:100%;
            padding:10px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:6px;
        }
        .info-box{
                background:#eaf4ff;
                border-left:5px solid #3498db;
                padding:12px;
                margin-bottom:20px;
                border-radius:6px;
                color:#2c3e50;
                font-size:14px;
            }

            label{
                display:block;
                margin-top:12px;
                margin-bottom:5px;
                font-weight:bold;
            }

            input, select{
                width:100%;
                padding:10px;
                border:1px solid #ccc;
                border-radius:6px;
                margin-bottom:10px;
            }

            .save-btn{
                background:#2ecc71;
                color:white;
                padding:10px 18px;
                border:none;
                border-radius:6px;
                cursor:pointer;
                font-weight:bold;
            }

            .save-btn:hover{
                opacity:0.9;
            }

        button{
            background:#3498db;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:6px;
            cursor:pointer;
        }

        a{
            margin-left:15px;
            text-decoration:none;
        }

    </style>

</head>

<body>

<div class="card">

<h1>Edit Technician</h1>
<div class="info-box">
    <strong>Technician Login Account</strong><br>
    If this technician was created before the login system was added,
    please assign a <b>Username</b> and <b>Password</b> below.
    These credentials will be used to log in to the Technician Dashboard.
</div>

<form method="POST">

    <label>Full Name</label>
    <input type="text"
           name="name"
           value="{{ technician[1] }}"
           required>

    <label>Email</label>
    <input type="email"
           name="email"
           value="{{ technician[2] }}"
           required>

    <label>Username (Technician Login)</label>
    <input type="text"
           name="username"
           value="{{ technician[4] or '' }}"
           placeholder="Enter login username"
           required>

    <label>Password (Technician Login)</label>
    <input type="text"
           name="password"
           value="{{ technician[5] or '' }}"
           placeholder="Enter temporary password"
           required>

    <label>Specialization</label>
    <select name="specialization" required>
        <option value="Network"
            {% if technician[3] == "Network" %}selected{% endif %}>
            Network
        </option>

        <option value="Authentication"
            {% if technician[3] == "Authentication" %}selected{% endif %}>
            Authentication
        </option>

        <option value="Performance"
            {% if technician[3] == "Performance" %}selected{% endif %}>
            Performance
        </option>

        <option value="General"
            {% if technician[3] == "General" %}selected{% endif %}>
            General
        </option>
    </select>

    <button type="submit" class="btn save-btn">
        Save Changes
    </button>

    <a href="/technicians">
        Cancel
    </a>

</form>

</div>

</body>
</html>
