<!DOCTYPE html>
<html>
<head>
    <title>Assigned Tickets</title>

    <style>

        *{
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{
            background:#f4f6f9;
            padding:25px;
        }

        h1{
            color:#2c3e50;
            margin-bottom:20px;
        }

        .top{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .btn{
            background:#3498db;
            color:white;
            padding:10px 16px;
            border-radius:6px;
            text-decoration:none;
        }

        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            box-shadow:0 2px 10px rgba(0,0,0,.08);
        }

        th{
            background:#2c3e50;
            color:white;
            padding:12px;
        }

        td{
            padding:10px;
            border-bottom:1px solid #eee;
            text-align:center;
        }

        tr:hover{
            background:#fafafa;
        }

        .open{
            color:#f39c12;
            font-weight:bold;
        }

        .progress{
            color:#9b59b6;
            font-weight:bold;
        }

        .resolved{
            color:#2ecc71;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="top">

    <h1>📋 Assigned Tickets</h1>

    <a href="/technicians" class="btn">
        ← Back
    </a>

</div>

<table>

<tr>
    <th>ID</th>
    <th>Title</th>
    <th>Category</th>
    <th>Priority</th>
    <th>Status</th>
</tr>

{% for ticket in tickets %}

<tr>

    <td>{{ ticket[0] }}</td>

    <td>{{ ticket[1] }}</td>

    <td>{{ ticket[2] }}</td>

    <td>{{ ticket[3] }}</td>

    <td>

        {% if ticket[4] == "Open" %}
            <span class="open">Open</span>

        {% elif ticket[4] == "In Progress" %}
            <span class="progress">In Progress</span>

        {% else %}
            <span class="resolved">Resolved</span>

        {% endif %}

    </td>

</tr>

{% endfor %}

</table>

</body>
</html>
