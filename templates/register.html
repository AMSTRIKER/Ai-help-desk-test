<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>

body{
    background:#f4f6f9;
    font-family:Arial;
}

.container{

    width:400px;
    margin:100px auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{

    width:100%;
    padding:10px;
    margin-top:10px;
}

button{

    width:100%;
    padding:10px;
    margin-top:15px;
    background:#2563eb;
    color:white;
    border:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Create Account</h2>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">
Register
</button>

</form>

<br>

<a href="/login">Already have an account?</a>

</div>

</body>
</html>
