<!DOCTYPE html>
<html>
<head>
<title>User Dashboard</title>

<style>

body{
    font-family:Arial;
    margin:0;
    background:#f4f6f9;
}

.sidebar{
    width:220px;
    height:100vh;
    background:#2c3e50;
    color:white;
    position:fixed;
}

.sidebar h2{
    text-align:center;
    padding:20px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px;
}

.sidebar a:hover{
    background:#34495e;
}

.content{
    margin-left:220px;
    padding:30px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0px 2px 5px rgba(0,0,0,0.2);
}


.notification{
    position:fixed;
    top:20px;
    right:20px;
    background:#2ecc71;
    color:white;
    padding:15px 25px;
    border-radius:8px;
    box-shadow:0 3px 10px rgba(0,0,0,.2);
    z-index:9999;
}


</style>

</head>

<body>
    {% with messages = get_flashed_messages() %}
{% if messages %}

<div class="notification">
    {{ messages[0] }}
</div>

<script>
setTimeout(()=>{
    document.querySelector('.notification').remove();
},3000);
</script>

{% endif %}
{% endwith %}

<div class="sidebar">

<h2>User Panel</h2>

<a href="/user-dashboard">Dashboard</a>

<a href="/my-tickets">My Tickets</a>

<a href="/chat-ui">AI Chat</a>

<a href="/logout">Logout</a>

</div>

<div class="content">

<div class="card">

<h1>Welcome {{ session.username }}</h1>

<p>Create and track support tickets.</p>

</div>

<br>

<div class="card">

<h2>Create Ticket</h2>

<form action="/ticket" method="POST">

<input
type="text"
name="title"
placeholder="Issue Title"
required
style="width:100%;padding:10px;"
>

<br><br>

<textarea
name="description"
placeholder="Describe your issue..."
required
style="width:100%;height:120px;"
></textarea>

<br><br>

<button type="submit">
Create Ticket
</button>

</form>

</div>

</div>

</body>
</html>
